# 本番環境デプロイ - Astro静的サイトをS3+CloudFrontへ自動デプロイ
name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  id-token: write # OIDC認証に必要
  contents: read  # リポジトリのチェックアウトに必要

jobs:
  deploy:
    name: ビルド & デプロイ
    runs-on: ubuntu-latest

    steps:
      # ソースコードの取得
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node.js LTS版のセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # 依存パッケージのインストール
      - name: Install dependencies
        run: npm ci

      # Astro静的サイトのビルド
      - name: Build Astro site
        run: npm run build

      # OIDC認証によるAWSクレデンシャル取得
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      # ビルド成果物をS3へ同期（不要ファイルは削除）
      - name: Deploy to S3
        run: aws s3 sync ./dist s3://coresignal-jp --delete

      # CloudFrontキャッシュの全パス削除
      - name: Invalidate CloudFront cache
        id: invalidation
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "invalidation_id=$INVALIDATION_ID" >> "$GITHUB_OUTPUT"

      # キャッシュ削除完了を待機
      - name: Wait for invalidation to complete
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --id ${{ steps.invalidation.outputs.invalidation_id }}
          echo "CloudFrontキャッシュの削除が完了しました"
